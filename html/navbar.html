<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NavBar</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .navbar {
      padding-top: 18px;
      padding-bottom: 18px;
      background: #fff !important;
    }

    .navbar .navbar-brand {
      margin-left: 48px;
      font-weight: 700;
      color: #0b5ed7;
      letter-spacing: 0.2px;
    }

    .navbar .nav-link {
      color: #6c757d;
      font-weight: 500;
      padding-left: 18px;
      padding-right: 18px;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link.active {
      color: #212529;
    }

    /* Make center nav ACTUALLY centered on large screens */
    @media (min-width: 992px) {
      .navbar .navbar-collapse {
        position: relative;
      }

      .navbar .navbar-nav.center-nav {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        margin-left: 70px; /* slight right shift like screenshot */
      }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">SB UI Kit Pro</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
      aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNavDropdown">

      <!-- Centered links -->
      <ul class="navbar-nav center-nav">
        <li class="nav-item mx-2"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="#">About us</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="#">Pricing</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="#">Contact</a></li>
        <li class="nav-item mx-2"><a class="nav-link" href="#">Team</a></li>
      </ul>

      <!-- Right button -->
      <div class="ms-auto me-5">
        <button type="button" class="btn btn-primary btn-lg">Buy Now →</button>
      </div>
  </div>
</nav>
</body>
</html>
